# ServiceAccounts: One per Application, Automount Off by Default
# Most application pods never call the Kubernetes API at all. Mounting a token
# they don't use is pure attack surface with zero benefit — if the container is
# ever compromised via an app-level vuln, there's no cluster credential sitting
# in the filesystem to steal.
#
# myapp-serviceaccount.yaml: creates a ServiceAccount per app with 
# automountServiceAccountToken: false, so pods using it will not get 
# a Kubernetes API token mounted by default.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: myapp
  namespace: team-alpha
automountServiceAccountToken: false


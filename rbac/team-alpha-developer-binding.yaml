apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: developer-binding
  namespace: team-alpha
subjects:
  - kind: Group
    name: team-alpha-developers      # bound to an OIDC group, not individual usernames —
    apiGroup: rbac.authorization.k8s.io   # onboarding/offboarding becomes an IdP group edit, not a cluster change
roleRef:
  kind: Role
  name: developer
  apiGroup: rbac.authorization.k8s.io